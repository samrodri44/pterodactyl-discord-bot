name: Deploy Project

#trigger
on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

#permissions
permissions:
  contents: read
  packages: write

#runner
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get metadata (tags)
        id: meta
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}
          echo "image=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build Image
        run: |
          docker build \
          -t ${{ steps.meta.outputs.image }}:latest \
          -t ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} \
          -f docker/Dockerfile .

      - name: Push Image
        run: |
          docker push ${{ steps.meta.outputs.image }}:latest
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Set up SSH
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CF_HOSTNAME: ${{ secrets.CF_HOSTNAME }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VPS_HOST: ${{ secrets.CF_HOSTNAME }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >>~/.ssh/config <<EOF
          Host ${VPS_HOST}
            User ${VPS_USER}
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id ${CF_ACCESS_CLIENT_ID} --service-token-secret ${CF_ACCESS_CLIENT_SECRET}
            StrictHostKeyChecking no
          EOF

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.CF_HOSTNAME }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh ${VPS_USER}@${VPS_HOST} "cd /opt/pterodactyl-discord-bot && sudo docker compose pull && sudo docker compose up -d --force-recreate"
